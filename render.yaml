services:
  - type: web
    name: frame-extraction-service
    env: python
    region: singapore
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python app.py"
    envVars:
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "10000"
      - key: FFMPEG_BIN
        value: "ffmpeg"
      - key: FFPROBE_BIN
        value: "ffprobe"
      - key: NIXPACKS_APT_PKGS
        value: "ffmpeg"
    healthCheckPath: /health
